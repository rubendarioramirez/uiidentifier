<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>findContours Only — No Source Image</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; margin: 0; padding: 20px; }
  h1 { text-align: center; font-size: 1.3em; margin-bottom: 4px; }
  .sub { text-align: center; color: #8b949e; font-size: 0.85em; margin-bottom: 16px; }
  .container { display: flex; gap: 16px; max-width: 1500px; margin: 0 auto; justify-content: center; }
  .panel { flex: 1; max-width: 480px; }
  .panel h2 { font-size: 0.9em; color: #58a6ff; margin: 0 0 6px; }
  .panel p { font-size: 0.78em; color: #8b949e; margin: 0 0 6px; }
  .panel img { width: 100%; border: 1px solid #30363d; border-radius: 6px; }
</style>
</head>
<body>
<h1>Threshold → findContours → Draw on blank canvas</h1>
<p class="sub">2,338 contours. Source image removed — only the contour lines remain. Is it re-drawing the image?</p>
<div class="container">
  <div class="panel">
    <h2>Original</h2>
    <img src="matchvillain.png" alt="Original">
  </div>
  <div class="panel">
    <h2>Contours only (white bg)</h2>
    <p>Blank white canvas + contour outlines only</p>
    <img src="mv5_contours_only_white.png" alt="Contours on white">
  </div>
  <div class="panel">
    <h2>Contours only (black bg)</h2>
    <p>Blank black canvas + contour outlines only</p>
    <img src="mv5_contours_only_black.png" alt="Contours on black">
  </div>
</div>
</body>
</html>
