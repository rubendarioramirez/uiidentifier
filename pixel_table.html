<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Color Table - 32x32</title>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
  h1 { text-align: center; font-size: 1.2em; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(32, 1fr); gap: 1px; max-width: 960px; margin: 0 auto; }
  .cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 6px; line-height: 1.1; text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .legend { text-align: center; margin-top: 20px; font-size: 14px; }
  .legend span { display: inline-block; width: 16px; height: 16px; vertical-align: middle; margin: 0 6px; border: 1px solid #555; }
</style>
</head>
<body>
<h1>32x32 Pixel Color Map</h1>
<div class="grid" id="grid"></div>
<div class="legend">
  <span style="background:#fff"></span> (255,255,255) — White
  &nbsp;&nbsp;
  <span style="background:#f00"></span> (255,0,0) — Red
</div>
<script>
const W = 32, H = 32;
// Build pixel data: white background, red square from (8,8) to (23,23)
const pixels = [];
for (let y = 0; y < H; y++) {
  for (let x = 0; x < W; x++) {
    if (x >= 8 && x < 24 && y >= 8 && y < 24) {
      pixels.push([255, 0, 0]);
    } else {
      pixels.push([255, 255, 255]);
    }
  }
}

const grid = document.getElementById('grid');
pixels.forEach(([r, g, b]) => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.style.background = `rgb(${r},${g},${b})`;
  // Dark text on white, white text on red
  cell.style.color = (r === 255 && g === 255 && b === 255) ? '#999' : '#fff';
  cell.textContent = `${r},${g},${b}`;
  grid.appendChild(cell);
});
</script>
</body>
</html>
